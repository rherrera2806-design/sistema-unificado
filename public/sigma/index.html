<!DOCTYPE html>
<html lang="es-CL">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGMA - Sistema de Gesti\u00f3n de Mantenimiento Industrial</title>
    <link rel="stylesheet" href="/sigma/css/style.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <button class="menu-toggle" onclick="App.toggleSidebar()" style="background:none;border:none;color:white;font-size:24px;cursor:pointer;padding:4px 8px;">☰</button>
            <div class="header-title"><span>SIGMA</span> - Mantenimiento Industrial</div>
            <div class="header-right">
                <span class="date-display" id="currentDate"></span>
                <button class="btn btn-outline" id="btnExport" style="color:white;border-color:rgba(255,255,255,0.4);font-size:12px;padding:5px 12px;margin-left:10px;background:transparent;cursor:pointer">📤 Exportar</button>
                <button class="btn btn-outline" id="btnImport" style="color:white;border-color:rgba(255,255,255,0.4);font-size:12px;padding:5px 12px;margin-left:4px;background:transparent;cursor:pointer">📥 Importar</button>
                <input type="file" id="importFile" accept=".json" style="display:none">
                <a href="/" style="color:white;text-decoration:none;padding:6px 14px;border:1px solid rgba(255,255,255,0.4);border-radius:6px;font-size:13px;margin-left:12px;transition:background 0.2s" onmouseover="this.style.background='rgba(255,255,255,0.15)'" onmouseout="this.style.background='transparent'">Salir</a>
            </div>
        </header>
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="App.closeSidebar()"></div>
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">M</div>
                <div class="logo-text">
                    SIGMA
                    <small>Sistema de Gestión de Mantenimiento</small>
                </div>
            </div>
            <nav class="sidebar-nav" id="sidebarNav"></nav>
        </aside>
        <main class="main-content" id="mainContent">
            <div class="page active" id="page-dashboard"></div>
        </main>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalHeaderTitle">Título</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body"></div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="App.hideModal()">Cerrar</button>
            </div>
        </div>
    </div>

    <script src="/sigma/js/api.js"></script>
    <script src="/sigma/js/app.js"></script>
    <script src="/sigma/js/modules/dashboard.js"></script>
    <script src="/sigma/js/modules/machineTypes.js"></script>
    <script src="/sigma/js/modules/machines.js"></script>
    <script src="/sigma/js/modules/components.js"></script>
    <script src="/sigma/js/modules/preventive.js"></script>
    <script src="/sigma/js/modules/corrective.js"></script>
    <script src="/sigma/js/modules/calendar.js"></script>
    <script src="/sigma/js/modules/notas.js"></script>
    <script src="/sigma/js/modules/history.js"></script>
    <script src="/sigma/js/modules/bitacora.js"></script>
    <script src="/sigma/js/modules/reports.js"></script>
    <script src="/sigma/js/modules/spareparts.js"></script>
</body>
</html>
