<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sistema Unificado - Mantencion, Inventario y Turnos">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="theme-color" content="#2563eb">
    <title>Sistema Unificado</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="dns-prefetch" href="//fonts.googleapis.com">
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        /* Critical CSS inlined for faster FCP */
        body{margin:0;font-family:system-ui,-apple-system,sans-serif;background:#f8fafc}
        .login-container{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
        .selector-container{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
    </style>
</head>
<body>
    <!-- LOGIN -->
    <div class="login-container" id="loginScreen">
        <div class="login-box">
            <div class="login-logo">S</div>
            <h1>Sistema Unificado</h1>
            <p class="subtitle">Mantencion + Inventario</p>
            <div id="loginError" class="alert-danger" style="display:none;"></div>
            <form onsubmit="doLogin(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" class="form-control" placeholder="admin@vidrieria.com" required>
                </div>
                <div class="form-group">
                    <label>Contrasena</label>
                    <input type="password" id="loginPassword" class="form-control" placeholder="Tu contrasena" required>
                </div>
                <button type="submit" class="btn btn-primary" id="loginBtn">Iniciar Sesion</button>
            </form>
        </div>
    </div>

    <!-- SELECTOR DE MODULO -->
    <div class="selector-container" id="selectorScreen" style="display:none;">
        <div class="selector-box">
            <div class="user-avatar" id="userAvatar">U</div>
            <h2>Bienvenido, <span id="userName">Usuario</span></h2>
            <p class="sub">Selecciona un modulo para continuar</p>
            <div class="module-grid" id="moduleGrid"></div>
            <button class="btn btn-outline" onclick="doLogout()" style="margin-top:8px;">Cerrar Sesion</button>
        </div>
    </div>

    <!-- ADMIN PANEL -->
    <div class="admin-container" id="adminScreen" style="display:none;">
        <div class="admin-header">
            <h1>Panel de Administracion</h1>
            <button class="btn btn-success btn-sm" onclick="showSelector()" style="padding:8px 18px;font-size:14px;">Volver a menu</button>
        </div>
        <div class="admin-body">
            <div class="admin-card">
                <div class="admin-card-header">
                    <h2>Usuarios</h2>
                    <button class="btn btn-success btn-sm" onclick="showUserForm()">+ Nuevo Usuario</button>
                </div>
                <table class="admin-table">
                    <thead><tr><th>Nombre</th><th>Email</th><th>Rol</th><th>Permisos</th><th>Estado</th><th>Acciones</th></tr></thead>
                    <tbody id="usersTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- INVENTARIO APP -->
    <div id="inventarioApp" style="display:none;"></div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
        <div class="modal">
            <h3 id="modalTitle"></h3>
            <div id="modalBody"></div>
            <div class="modal-actions" id="modalActions"></div>
        </div>
    </div>

    <script>
        const USER_KEY = 'unified_user';

        function getUser() {
            try { return JSON.parse(localStorage.getItem(USER_KEY)); } catch(e) { return null; }
        }

        function getPermisos(u) {
            const p = (u||{}).permisos || [];
            return Array.isArray(p) ? p : [];
        }

        function showLogin() {
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('selectorScreen').style.display = 'none';
            document.getElementById('adminScreen').style.display = 'none';
            document.getElementById('inventarioApp').style.display = 'none';
        }

        function showSelector() {
            const user = getUser();
            if (!user) return showLogin();
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('selectorScreen').style.display = 'flex';
            document.getElementById('adminScreen').style.display = 'none';
            document.getElementById('inventarioApp').style.display = 'none';
            document.getElementById('userName').textContent = user.nombre;
            document.getElementById('userAvatar').textContent = user.nombre.charAt(0).toUpperCase();
            renderModules();
        }

        function renderModules() {
            const user = getUser();
            const permisos = getPermisos(user);
            const grid = document.getElementById('moduleGrid');
            
            const modules = [
                { key: 'sigma', icon: `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>`, iconBg: '#10b981', title: 'SIGMA', desc: 'Mantenimiento preventivo y correctivo de maquinaria', href: '/sigma/' },
                { key: 'inventario', icon: `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>`, iconBg: '#3b82f6', title: 'Inventario', desc: 'Control de stock, entradas y salidas de cristales', href: '/inventario/' },
                { key: 'turnos', icon: `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>`, iconBg: '#f59e0b', title: 'Turnos QR', desc: 'Sistema de turnos con codigo QR en tiempo real', href: '/turnos/' },
                { key: 'pedidos', icon: `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>`, iconBg: '#ec4899', title: 'Pedidos', desc: 'Gestión de pedidos y documentos PDF', href: '/pedidos/' },
                { key: 'usuarios', icon: `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`, iconBg: '#8b5cf6', title: 'Usuarios', desc: 'Gestionar usuarios y permisos del sistema', action: 'admin' }
            ];

            grid.innerHTML = '';
            
            for (const mod of modules) {
                if (permisos.includes(mod.key)) {
                    const card = document.createElement('div');
                    card.className = 'module-card';
                    card.innerHTML = `
                        <div class="module-icon" style="background:${mod.iconBg}">${mod.icon}</div>
                        <h3>${mod.title}</h3>
                        <p>${mod.desc}</p>
                    `;
                    
                    if (mod.action === 'admin') {
                        card.onclick = function() { openAdmin(); };
                    } else {
                        card.onclick = function() { window.location.href = mod.href; };
                    }
                    
                    grid.appendChild(card);
                }
            }
        }

        async function doLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');
            const errDiv = document.getElementById('loginError');
            
            btn.textContent = 'Ingresando...';
            btn.disabled = true;
            errDiv.style.display = 'none';
            
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Error');
                localStorage.setItem(USER_KEY, JSON.stringify(data));
                window.location.href = '/app.html';
            } catch(err) {
                errDiv.textContent = err.message;
                errDiv.style.display = 'block';
            } finally {
                btn.textContent = 'Iniciar Sesion';
                btn.disabled = false;
            }
        }

        function doLogout() {
            localStorage.removeItem(USER_KEY);
            showLogin();
        }

        function openAdmin() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('selectorScreen').style.display = 'none';
            document.getElementById('inventarioApp').style.display = 'none';
            document.getElementById('adminScreen').style.display = 'block';
            loadUsers();
        }

        async function loadUsers() {
            try {
                const res = await fetch('/api/admin/usuarios');
                const users = await res.json();
                const tbody = document.getElementById('usersTable');
                tbody.innerHTML = users.map(u => `<tr>
                    <td><strong>${u.nombre}</strong></td>
                    <td>${u.email}</td>
                    <td><span class="badge badge-${u.rol}">${u.rol}</span></td>
                    <td>${(u.permisos||[]).map(p => `<span class="badge badge-${p}">${p}</span>`).join(' ') || 'Sin permisos'}</td>
                    <td><span class="badge badge-${u.activo ? 'active' : 'inactive'}">${u.activo ? 'Activo' : 'Inactivo'}</span></td>
                    <td>
                        <button class="btn btn-outline btn-sm" onclick="showUserForm(${u.id})">Editar</button>
                        ${u.rol !== 'admin' ? `<button class="btn btn-danger btn-sm" onclick="deleteUser(${u.id})">Eliminar</button>` : ''}
                    </td>
                </tr>`).join('');
            } catch(e) { console.error(e); }
        }

        async function showUserForm(id) {
            let user = { nombre: '', email: '', password: '', rol: 'usuario', permisos: [] };
            if (id) {
                try {
                    const res = await fetch('/api/admin/usuarios');
                    const all = await res.json();
                    user = all.find(u => u.id === id) || user;
                } catch(e) {}
            }
            const up = getPermisos(user);
            document.getElementById('modalTitle').textContent = id ? 'Editar Usuario' : 'Nuevo Usuario';
            document.getElementById('modalBody').innerHTML = `
                <div class="form-group"><label>Nombre</label><input class="form-control" id="fNombre" value="${user.nombre}"></div>
                <div class="form-group"><label>Email</label><input class="form-control" id="fEmail" type="email" value="${user.email}"></div>
                <div class="form-group"><label>${id ? 'Nueva contrasena (dejar vacio para no cambiar)' : 'Contrasena'}</label><input class="form-control" id="fPassword" type="password" ${id ? '' : 'required'}></div>
                <div class="form-group"><label>Rol</label>
                    <select class="form-control" id="fRol">
                        <option value="usuario" ${user.rol==='usuario'?'selected':''}>Usuario</option>
                        <option value="admin" ${user.rol==='admin'?'selected':''}>Administrador</option>
                    </select>
                </div>
                <div class="form-group"><label>Modulos permitidos</label>
                    <div class="check-grid">
                        <label class="check-label"><input type="checkbox" class="perm-check" value="sigma" ${up.includes('sigma')?'checked':''}> Mantencion (SIGMA)</label>
                        <label class="check-label"><input type="checkbox" class="perm-check" value="inventario" ${up.includes('inventario')?'checked':''}> Inventario</label>
                        <label class="check-label"><input type="checkbox" class="perm-check" value="turnos" ${up.includes('turnos')?'checked':''}> Turnos QR</label>
                        <label class="check-label"><input type="checkbox" class="perm-check" value="pedidos" ${up.includes('pedidos')?'checked':''}> Pedidos</label>
                        <label class="check-label"><input type="checkbox" class="perm-check" value="pedidos.autorizar" ${up.includes('pedidos.autorizar')?'checked':''}> Autorizar Pedidos</label>
                        <label class="check-label"><input type="checkbox" class="perm-check" value="usuarios" ${up.includes('usuarios')?'checked':''}> Administrar Usuarios</label>
                    </div>
                </div>`;
            document.getElementById('modalActions').innerHTML = `
                <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
                <button class="btn btn-primary" style="width:auto" onclick="saveUser(${id || 0})">${id ? 'Actualizar' : 'Crear'}</button>`;
            document.getElementById('modalOverlay').classList.add('show');
        }

        async function saveUser(id) {
            const data = {
                nombre: document.getElementById('fNombre').value.trim(),
                email: document.getElementById('fEmail').value.trim(),
                rol: document.getElementById('fRol').value,
                permisos: Array.from(document.querySelectorAll('.perm-check:checked')).map(c => c.value)
            };
            const pw = document.getElementById('fPassword').value;
            if (pw) data.password = pw;
            if (!data.nombre || !data.email) return alert('Nombre y email son requeridos');
            if (!id && !pw) return alert('La contrasena es requerida');
            try {
                const url = id ? `/api/admin/usuarios/${id}` : '/api/admin/usuarios';
                const method = id ? 'PUT' : 'POST';
                const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                if (!res.ok) { const err = await res.json(); alert(err.error); return; }
                closeModal();
                loadUsers();
            } catch(e) { alert('Error: ' + e.message); }
        }

        async function deleteUser(id) {
            if (!confirm('Eliminar este usuario?')) return;
            try { await fetch(`/api/admin/usuarios/${id}`, { method: 'DELETE' }); loadUsers(); } catch(e) { alert('Error'); }
        }

        function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }

        // Init
        if (getUser()) showSelector(); else showLogin();
    </script>
</body>
</html>
