<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitroFlow - TEMPLAGLASS</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
    <!-- SIDEBAR -->
    <div class="app-layout" id="launcherView">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">S</div>
                <div class="sidebar-title">
                    VitroFlow
                    <small>TEMPLAGLASS</small>
                </div>
            </div>
            <nav class="sidebar-nav" id="sidebarNav"></nav>
        </aside>
        <header class="header">
            <button class="menu-toggle" onclick="App.toggleSidebar()">☰</button>
            <button class="sidebar-collapse-btn" onclick="App.toggleSidebarCollapse()" title="Ocultar/Mostrar sidebar" style="background:none;border:none;color:var(--text);font-size:18px;cursor:pointer;padding:4px 8px;border-radius:6px;transition:background .2s" onmouseover="this.style.background='var(--border)'" onmouseout="this.style.background='none'">◀</button>
            <div class="header-left">
                <div class="header-title" id="headerTitle">VitroFlow</div>
            </div>
            <div class="header-right">
                <div class="header-date" id="currentDate"></div>
                <div class="header-user">
                    <div class="user-avatar" id="userAvatar">U</div>
                    <span id="userName">Usuario</span>
                </div>
            </div>
        </header>
        <main class="main-content" id="mainContent">
            <div class="page active" id="page-dashboard"></div>
        </main>
    </div>

    <!-- IFRAME VIEW (for external modules) -->
    <div class="module-view" id="moduleView" style="display:none">
        <div class="module-toolbar">
            <button class="btn-back" onclick="closeModule()">← Volver al Panel</button>
            <span class="module-label" id="moduleLabel"></span>
        </div>
        <iframe id="moduleFrame" src="" frameborder="0"></iframe>
    </div>

    <!-- MODAL (SIGMA-compatible) -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalHeaderTitle">Titulo</h3>
                <button class="modal-close" onclick="App.hideModal()">&times;</button>
            </div>
            <div class="modal-body"></div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="App.hideModal()">Cerrar</button>
            </div>
        </div>
    </div>

    <!-- SIGMA API (creates window.db) -->
    <script src="/sigma/js/api.js"></script>

    <!-- Unified App (creates window.App, window.api) -->
    <script src="/js/app-main.js"></script>

    <!-- SIGMA Modules (register with App) -->
    <script src="/sigma/js/modules/dashboard.js"></script>
    <script src="/sigma/js/modules/machineTypes.js"></script>
    <script src="/sigma/js/modules/machines.js"></script>
    <script src="/sigma/js/modules/components.js"></script>
    <script src="/sigma/js/modules/preventive.js"></script>
    <script src="/sigma/js/modules/corrective.js"></script>
    <script src="/sigma/js/modules/calendar.js"></script>
    <script src="/sigma/js/modules/notas.js"></script>
    <script src="/sigma/js/modules/history.js"></script>
    <script src="/sigma/js/modules/bitacora.js"></script>
    <script src="/sigma/js/modules/reports.js"></script>
    <script src="/sigma/js/modules/spareparts.js"></script>

    <!-- Inventario Modules (use global api object) -->
    <script src="/inv-js/modules/inventario.js"></script>
    <script src="/inv-js/modules/movimientos.js"></script>
    <script src="/inv-js/modules/historial.js"></script>
    <script src="/inv-js/modules/catalogos.js"></script>

    <!-- Pedidos Module (inline) -->
    <script src="/js/modules/pedidos.js"></script>
    <script src="/js/modules/usuarios.js"></script>

    <!-- Turnos Module (inline) -->
    <script src="/js/modules/turnos.js"></script>

    <!-- Produccion Module (inline) -->
    <script src="/js/xlsx.full.min.js"></script>
    <script src="/js/modules/produccion.js"></script>
    <script src="/js/modules/prod_codigos.js"></script>
    <script src="/js/modules/prod_maquinas.js"></script>
    <script src="/js/modules/prod_recetas.js"></script>
    <script src="/js/modules/prod_notas.js"></script>
    <script src="/js/modules/prod_config.js"></script>
    <script src="/js/chart.umd.min.js"></script>
    <script src="/js/chartjs-plugin-datalabels.min.js"></script>
    <script src="/js/modules/planificacion.js"></script>
    <script src="/js/modules/instalaciones.js"></script>
    <script src="/js/modules/inst_detalle.js"></script>
    <script src="/js/modules/inst_historial.js"></script>
</body>
</html>
