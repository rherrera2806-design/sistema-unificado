<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Unificado - Vidrieria</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
    <!-- VISTA SIDEBAR (launcher) -->
    <div class="app-layout" id="launcherView">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">S</div>
                <div class="sidebar-title">
                    Sistema Unificado
                    <small>Vidrieria</small>
                </div>
            </div>
            <nav class="sidebar-nav" id="sidebarNav"></nav>
        </aside>
        <header class="header">
            <button class="menu-toggle" onclick="toggleSidebar()">\u2630</button>
            <div class="header-left">
                <div class="header-title" id="headerTitle">Panel Principal</div>
            </div>
            <div class="header-right">
                <div class="header-date" id="currentDate"></div>
                <div class="header-user">
                    <div class="user-avatar" id="userAvatar">U</div>
                    <span id="userName">Usuario</span>
                </div>
                <button class="btn-header" onclick="doLogout()">Salir</button>
            </div>
        </header>
        <main class="main-content" id="mainContent">
            <div class="module-grid" id="moduleGrid"></div>
        </main>
    </div>

    <!-- VISTA MODULO (iframe full-screen) -->
    <div class="module-view" id="moduleView" style="display:none">
        <div class="module-toolbar">
            <button class="btn-back" onclick="closeModule()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                Volver al Panel
            </button>
            <span class="module-label" id="moduleLabel"></span>
        </div>
        <iframe id="moduleFrame" src="" frameborder="0"></iframe>
    </div>

    <!-- API Client for auth -->
    <script>
    class ApiClient {
        constructor() { this.baseUrl = '/api'; }
        async request(method, path, body = null) {
            const opts = { method, headers: { 'Content-Type': 'application/json' } };
            if (body) opts.body = JSON.stringify(body);
            const res = await fetch(`${this.baseUrl}${path}`, opts);
            if (!res.ok) {
                const err = await res.json().catch(() => ({ error: res.statusText }));
                throw new Error(err.error || `HTTP ${res.status}`);
            }
            return res.json();
        }
        async login(email, password) { return this.request('POST', '/auth/login', { email, password }); }
    }
    const db = new ApiClient();
    </script>

    <script src="/js/app-main.js"></script>
</body>
</html>
