<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="theme-color" content="#2563eb">
    <meta name="description" content="Control de inventario de vidrieria">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Control Inventario - Vidrieria</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="dns-prefetch" href="//fonts.googleapis.com">
    <link rel="stylesheet" href="/inv-css/style.css">
    <style>
        /* Critical CSS inlined for faster FCP */
        .app-container{display:grid;grid-template-columns:250px 1fr;grid-template-rows:56px 1fr;height:100vh;grid-template-areas:"sidebar header" "sidebar main"}
        .sidebar{grid-area:sidebar;background:#0f172a;overflow-y:auto}
        .main-content{grid-area:main;overflow-y:auto;padding:24px;background:#f1f5f9}
        .page{display:none}.page.active{display:block}
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <button class="menu-toggle" onclick="App.toggleSidebar()" aria-label="Abrir menú">☰</button>
            <div class="header-title"><span>Control Inventario</span> - Vidrieria</div>
            <div class="header-right">
                <span class="user-name" id="headerUser"></span>
                <a href="/" style="background:#16a34a;color:white;text-decoration:none;padding:7px 16px;border-radius:6px;font-size:13px;margin-left:12px;font-weight:500;">Salir</a>
            </div>
        </header>
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="App.closeSidebar()"></div>
        <aside class="sidebar" id="sidebar"></aside>
        <main class="main-content" id="mainContent"></main>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">Titulo</h3>
                <button class="modal-close" onclick="App.hideModal()" aria-label="Cerrar">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer" id="modalFooter">
                <button class="btn btn-outline" onclick="App.hideModal()">Cerrar</button>
            </div>
        </div>
    </div>
    <div class="toast" id="toast" role="alert" aria-live="polite"></div>

    <script src="/inv-js/api.js" defer></script>
    <script src="/inv-js/app.js" defer></script>
    <script src="/inv-js/modules/catalogos.js" defer></script>
    <script src="/inv-js/modules/movimientos.js" defer></script>
    <script src="/inv-js/modules/inventario.js" defer></script>
    <script src="/inv-js/modules/historial.js" defer></script>
</body>
</html>
