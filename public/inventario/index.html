<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="theme-color" content="#2563eb">
    <title>Control Inventario - Vidrieria</title>
    <link rel="stylesheet" href="/inv-css/style.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <button class="menu-toggle" onclick="App.toggleSidebar()" aria-label="Abrir menú">☰</button>
            <div class="header-title"><span>Control Inventario</span> - Vidrieria</div>
            <div class="header-right">
                <span class="user-name" id="headerUser"></span>
                <a href="/" style="background:#16a34a;color:white;text-decoration:none;padding:7px 16px;border-radius:6px;font-size:13px;margin-left:12px;font-weight:500;">Salir</a>
            </div>
        </header>
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="App.closeSidebar()"></div>
        <aside class="sidebar" id="sidebar"></aside>
        <main class="main-content" id="mainContent"></main>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">Titulo</h3>
                <button class="modal-close" onclick="App.hideModal()" aria-label="Cerrar">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer" id="modalFooter">
                <button class="btn btn-outline" onclick="App.hideModal()">Cerrar</button>
            </div>
        </div>
    </div>
    <div class="toast" id="toast" role="alert" aria-live="polite"></div>

    <script src="/inv-js/api.js"></script>
    <script src="/inv-js/app.js"></script>
    <script src="/inv-js/modules/catalogos.js"></script>
    <script src="/inv-js/modules/dashboard.js"></script>
    <script src="/inv-js/modules/movimientos.js"></script>
    <script src="/inv-js/modules/inventario.js"></script>
    <script src="/inv-js/modules/historial.js"></script>
</body>
</html>
